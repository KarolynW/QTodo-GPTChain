server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: let React handle anything that isn't a real file.
    # This is the only nginx config you will ever need to write for a Vite app.
    # You're welcome.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend so the browser doesn't have to think
    # about CORS. It has enough to worry about.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
